<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function() {
        const saved = localStorage.getItem("theme");
        if (saved === "dark" || (!saved && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
          document.documentElement.classList.add("dark");
        } else {
          document.documentElement.classList.remove("dark");
        }
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✨</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Masala Craft Contactless Digital Tabletop Indian Menu. Browse traditional tandoori starters, rich curries, fragrant biryanis, and hand-stretched naans." />
    <meta name="keywords" content="digital menu, indian restaurant, contactless ordering, curries, tandoori, Masala Craft" />
    <meta name="author" content="Masala Craft Indian Bistro" />
    <title>Masala Craft | Premium Indian Dining & Table Ordering</title>
  </head>

    <div id="root"></div>

  </body>
</html>
